services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "echo 'Backend scaffold ready' && tail -f /dev/null"
