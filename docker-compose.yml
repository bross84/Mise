services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - mise_data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  mise_data:
